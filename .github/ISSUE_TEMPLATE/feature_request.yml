name: Feature request
description: Suggest an improvement or a new bit of behaviour
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        If you've got an idea for the package, this is the place. If you want
        to discuss something open-ended first (e.g. "should we support X?"),
        the [Discussions](https://github.com/BadranRaza/com.unity.ide.antigravity/discussions)
        tab is usually a better starting point.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the pain point, not the solution yet — that helps catch cases where the feature might not be the right fix.
    validations:
      required: true

  - type: textarea
    id: proposed
    attributes:
      label: Proposed change
      description: How would the package behave with this feature in place?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Optional. Workarounds you've tried, other packages, etc.
